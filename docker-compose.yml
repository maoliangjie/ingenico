services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./storage:/app/storage
      - ./docs:/app/docs
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    image: ingenico-api:latest
    working_dir: /frontend
    command: >
      sh -c "test -f /frontend/dist/index.html &&
      python -m http.server 5173 --directory /frontend/dist ||
      (echo 'frontend/dist is missing. Run: cd frontend && npm install && npm run build' && exit 1)"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/dist:/frontend/dist:ro
    depends_on:
      - api

volumes:
  redis-data:
